{% set name = "py-rust-stemmers" %}
{% set version = "0.1.5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/{{ name }}/py_rust_stemmers-{{ version }}.tar.gz
  sha256: e9c310cfb5c2470d7c7c8a0484725965e7cab8b1237e106a0863d5741da3e1f7

build:
  number: 0
  skip: true  # [py<310 or py>313]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
  host:
    - pip
    - python
    - maturin >=0.12
  run:
    - python

test:
  imports:
    - py_rust_stemmers
  requires:
    - pip
  commands:
    - pip check
    - python -c "from py_rust_stemmers import SnowballStemmer; assert SnowballStemmer('english').stem_word('running') == 'run'"

about:
  home: https://github.com/qdrant/py-rust-stemmers
  dev_url: https://github.com/qdrant/py-rust-stemmers
  doc_url: https://github.com/qdrant/py-rust-stemmers
  summary: Fast and parallel snowball stemmer
  description: |
    py-rust-stemmers is a high-performance Python wrapper around the
    rust-stemmers library, utilizing the Snowball stemming algorithm. It
    allows for efficient stemming of words with support for parallel
    processing, making it a useful tool for text processing tasks.

    Features:
      - Uses the Snowball stemming algorithms for efficient word stemming in
        multiple languages.
      - Offers parallel processing for batch stemming, providing significant
        speedup for larger text sequences.
      - Leverages the performance of Rust for fast, reliable text processing.
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - moritzwilksch
